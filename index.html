<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Responsive design</title>
  </head>
  <body>
    <!-- Task 4: Responsive navigation menu -->
    <nav class="responsive-nav">
      <button class="menu-toggle">☰ Menu</button>
      <ul class="nav-list">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <!-- Task 1: Responsive container with two columns -->
    <div class="responsive-container">
      <div class="column">Column 1</div>
      <div class="column">Column 2</div>
      <!-- Task 2: Responsive image -->
      <img src="ferrari.jpg" alt="Responsive Image" class="responsive-image" />
    </div>
    <!-- Task 3: Responsive media query box -->
    <div class="media-query-box">Resize the window to see the effect</div>
    <!-- Task 5: No errors on HTML-validation -->
  </body>
</html>
